<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kategoriler – Cango Toys Admin</title>
  <link rel="stylesheet" href="/css/admin.css"/>
</head>
<body>
  <button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>
  <aside class="admin-sidebar">
    <div class="admin-logo"><div class="admin-logo-text">Cango<span>Toys</span></div><div class="admin-logo-sub">Admin Paneli</div></div>
    <nav class="sidebar-nav">
      <div class="sidebar-label">Yönetim</div>
      <a href="/admin/dashboard.html" class="sidebar-link"><span class="sidebar-icon">📊</span> Dashboard</a>
      <a href="/admin/products.html" class="sidebar-link"><span class="sidebar-icon">📦</span> Ürünler</a>
      <a href="/admin/categories.html" class="sidebar-link active"><span class="sidebar-icon">🗂️</span> Kategoriler</a>
      <a href="/admin/orders.html" class="sidebar-link"><span class="sidebar-icon">🛒</span> Siparişler</a>
      <a href="/" class="sidebar-link" target="_blank"><span class="sidebar-icon">🏪</span> Mağazaya Git</a>
    </nav>
    <div class="sidebar-footer"><div class="admin-user"><div class="admin-avatar">👤</div><div><div style="font-size:0.88rem;font-weight:700;color:white">Cango Admin</div></div><button onclick="logout()" style="margin-left:auto;background:none;border:none;color:var(--gray-400);cursor:pointer;font-size:1.1rem">🚪</button></div></div>
  </aside>

  <main class="admin-main">
    <header class="admin-header">
      <div class="admin-page-title">🗂️ Kategori Yönetimi</div>
      <button class="btn btn-primary" onclick="openAdd()">+ Yeni Kategori</button>
    </header>
    <div class="admin-content">
      <div class="admin-card">
        <div style="overflow-x:auto">
          <table class="admin-table">
            <thead><tr><th>İkon</th><th>Ad</th><th>Slug</th><th>Açıklama</th><th>Ürün Sayısı</th><th>İşlem</th></tr></thead>
            <tbody id="catBody"><tr><td colspan="6" style="text-align:center;padding:2rem;color:var(--gray-400)">Yükleniyor…</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <!-- MODAL -->
  <div class="modal-overlay" id="catModal">
    <div class="modal">
      <div class="modal-header"><div class="modal-title" id="modalTitle">Yeni Kategori</div><button class="modal-close" onclick="closeModal('catModal')">✕</button></div>
      <input type="hidden" id="editId"/>
      <div class="form-group"><label class="form-label">Kategori Adı *</label><input class="form-control" id="fName" placeholder="Oyuncaklar"/></div>
      <div class="form-group"><label class="form-label">Slug *</label><input class="form-control" id="fSlug" placeholder="oyuncaklar"/></div>
      <div class="form-group"><label class="form-label">İkon (Emoji)</label><input class="form-control" id="fIcon" placeholder="🎁 (emoji girin)"/></div>
      <div class="form-group"><label class="form-label">Açıklama</label><input class="form-control" id="fDesc" placeholder="Kategori açıklaması"/></div>
      <div id="modalError" style="color:var(--brand-purple);font-size:0.85rem;margin-bottom:0.5rem;display:none"></div>
      <div style="display:flex;gap:0.8rem;justify-content:flex-end">
        <button class="btn btn-ghost" onclick="closeModal('catModal')">İptal</button>
        <button class="btn btn-primary" onclick="saveCat()">Kaydet</button>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>
  <script src="/js/admin.js"></script>
  <script>
    let allCats = [];
    async function load() {
      if (!await checkAuth()) return;
      allCats = await fetch('/api/categories').then(r=>r.json());
      render();
    }
    function render() {
      const body = document.getElementById('catBody');
      if (!allCats.length) { body.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:2rem">Kategori yok</td></tr>'; return; }
      body.innerHTML = allCats.map(c => `<tr>
        <td style="font-size:1.8rem">${c.icon}</td>
        <td><strong>${c.name}</strong></td>
        <td><code style="background:var(--gray-100);padding:0.2rem 0.5rem;border-radius:4px;font-size:0.8rem">${c.slug}</code></td>
        <td style="color:var(--gray-600);font-size:0.88rem">${c.description||'–'}</td>
        <td><span class="badge badge-blue">${c.productCount} ürün</span></td>
        <td><div style="display:flex;gap:0.4rem">
          <button class="btn btn-ghost btn-sm" onclick='editCat(${JSON.stringify(c)})'>✏️</button>
          <button class="btn btn-brand-purple btn-sm" onclick="deleteCat('${c.id}','${c.name}',${c.productCount})">🗑️</button>
        </div></td>
      </tr>`).join('');
    }
    function openAdd() {
      ['fName','fSlug','fIcon','fDesc'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('editId').value = '';
      document.getElementById('modalTitle').textContent = 'Yeni Kategori';
      document.getElementById('modalError').style.display = 'none';
      document.getElementById('fIcon').value = '📦';
      openModal('catModal');
    }
    function editCat(c) {
      document.getElementById('modalTitle').textContent = 'Kategoriyi Düzenle';
      document.getElementById('editId').value = c.id;
      document.getElementById('fName').value = c.name;
      document.getElementById('fSlug').value = c.slug;
      document.getElementById('fIcon').value = c.icon;
      document.getElementById('fDesc').value = c.description||'';
      document.getElementById('modalError').style.display = 'none';
      openModal('catModal');
    }
    async function saveCat() {
      const id = document.getElementById('editId').value;
      const body = { name: document.getElementById('fName').value.trim(), slug: document.getElementById('fSlug').value.trim(), icon: document.getElementById('fIcon').value.trim(), description: document.getElementById('fDesc').value.trim() };
      const errEl = document.getElementById('modalError');
      if (!body.name || !body.slug) { errEl.textContent = 'Ad ve slug zorunludur'; errEl.style.display = 'block'; return; }
      const res = await fetch(id ? `/api/categories/${id}` : '/api/categories', { method: id ? 'PUT' : 'POST', headers: authHeaders(), body: JSON.stringify(body) });
      const data = await res.json();
      if (!res.ok) { errEl.textContent = data.message; errEl.style.display = 'block'; return; }
      closeModal('catModal');
      showToast(id ? 'Kategori güncellendi ✅' : 'Kategori eklendi ✅');
      allCats = await fetch('/api/categories').then(r=>r.json());
      render();
    }
    async function deleteCat(id, name, count) {
      if (count > 0) { showToast(`Bu kategoride ${count} ürün var. Önce ürünleri taşıyın.`, 'error'); return; }
      if (!confirm(`"${name}" kategorisini silmek istiyor musunuz?`)) return;
      await fetch(`/api/categories/${id}`, { method: 'DELETE', headers: authHeaders() });
      showToast('Kategori silindi');
      allCats = allCats.filter(c => c.id !== id);
      render();
    }
    load();
  </script>
</body>
</html>
