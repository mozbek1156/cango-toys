<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ürün Yönetimi – Cango Toys Admin</title>
  <link rel="stylesheet" href="/css/admin.css"/>
</head>
<body>
  <button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>
  <aside class="admin-sidebar">
    <div class="admin-logo"><div class="admin-logo-text">Cango<span>Toys</span></div><div class="admin-logo-sub">Admin Paneli</div></div>
    <nav class="sidebar-nav">
      <div class="sidebar-label">Yönetim</div>
      <a href="/admin/dashboard.html" class="sidebar-link"><span class="sidebar-icon">📊</span> Dashboard</a>
      <a href="/admin/products.html" class="sidebar-link active"><span class="sidebar-icon">📦</span> Ürünler</a>
      <a href="/admin/categories.html" class="sidebar-link"><span class="sidebar-icon">🗂️</span> Kategoriler</a>
      <a href="/admin/orders.html" class="sidebar-link"><span class="sidebar-icon">🛒</span> Siparişler</a>
      <div class="sidebar-label" style="margin-top:1rem">Mağaza</div>
      <a href="/" class="sidebar-link" target="_blank"><span class="sidebar-icon">🏪</span> Mağazaya Git</a>
    </nav>
    <div class="sidebar-footer"><div class="admin-user"><div class="admin-avatar">👤</div><div><div style="font-size:0.88rem;font-weight:700;color:white">Cango Admin</div></div><button onclick="logout()" style="margin-left:auto;background:none;border:none;color:var(--gray-400);cursor:pointer;font-size:1.1rem" title="Çıkış">🚪</button></div></div>
  </aside>

  <main class="admin-main">
    <header class="admin-header">
      <div class="admin-page-title">📦 Ürün Yönetimi</div>
      <button class="btn btn-primary" onclick="openAddModal()">+ Yeni Ürün</button>
    </header>
    <div class="admin-content">
      <div class="admin-card">
        <div class="admin-card-header">
          <div class="admin-search"><span>🔍</span><input id="searchProd" placeholder="Ürün ara…" oninput="filterTable()"/></div>
          <div style="display:flex;gap:0.5rem">
            <select class="btn btn-ghost btn-sm" id="catFilter" onchange="filterTable()"><option value="">Tüm Kategoriler</option></select>
            <div id="prodCount" style="font-size:0.85rem;color:var(--gray-400);align-self:center"></div>
          </div>
        </div>
        <div style="overflow-x:auto">
          <table class="admin-table">
            <thead><tr><th>Ürün</th><th>Kategori</th><th>Perakende</th><th>Toptan</th><th>Stok</th><th>Öne Çıkan</th><th>İşlem</th></tr></thead>
            <tbody id="prodBody"><tr><td colspan="7" style="text-align:center;padding:2rem;color:var(--gray-400)">Yükleniyor…</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <!-- ADD/EDIT MODAL -->
  <div class="modal-overlay" id="prodModal">
    <div class="modal" style="max-width:600px">
      <div class="modal-header">
        <div class="modal-title" id="modalTitle">Yeni Ürün Ekle</div>
        <button class="modal-close" onclick="closeModal('prodModal')">✕</button>
      </div>
      <input type="hidden" id="editId"/>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Ürün Adı *</label><input class="form-control" id="fName" placeholder="Ürün adı"/></div>
        <div class="form-group"><label class="form-label">Kategori *</label><select class="form-control" id="fCat"></select></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Perakende Fiyat (₺) *</label><input class="form-control" id="fPrice" type="number" placeholder="0.00"/></div>
        <div class="form-group"><label class="form-label">Toptan Fiyat (₺)</label><input class="form-control" id="fWholesale" type="number" placeholder="Boş = otomatik %20 indirim"/></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Stok Adedi</label><input class="form-control" id="fStock" type="number" placeholder="0"/></div>
        <div class="form-group" style="padding-top:1.6rem"><label style="display:flex;align-items:center;gap:0.5rem;cursor:pointer;font-weight:700"><input type="checkbox" id="fFeatured" style="width:18px;height:18px;accent-color:var(--brand-blue)"> Öne Çıkan Ürün</label></div>
      </div>
      <div class="form-group"><label class="form-label">Açıklama</label><textarea class="form-control" id="fDesc" rows="3" placeholder="Ürün açıklaması…"></textarea></div>
      <div class="form-group"><label class="form-label">Etiketler</label><input class="form-control" id="fTags" placeholder="oyuncak, lego, çocuk (virgülle ayırın)"/></div>
      <div id="modalError" style="background: rgba(156,39,176,0.1);color:var(--brand-purple);padding:0.7rem 1rem;border-radius:var(--radius-sm);margin-bottom:1rem;display:none;font-weight:600"></div>
      <div style="display:flex;gap:0.8rem;justify-content:flex-end">
        <button class="btn btn-ghost" onclick="closeModal('prodModal')">İptal</button>
        <button class="btn btn-primary" id="saveBtn" onclick="saveProduct()">Kaydet</button>
      </div>
    </div>
  </div>

  <!-- DELETE CONFIRM -->
  <div class="modal-overlay" id="delModal">
    <div class="modal" style="max-width:380px;text-align:center">
      <div style="font-size:4rem;margin-bottom:1rem">🗑️</div>
      <h3 style="margin-bottom:0.5rem">Ürünü Sil</h3>
      <p style="color:var(--gray-600);margin-bottom:2rem">"<strong id="delName"></strong>" ürününü silmek istediğinize emin misiniz?</p>
      <div style="display:flex;gap:1rem;justify-content:center">
        <button class="btn btn-ghost" onclick="closeModal('delModal')">İptal</button>
        <button class="btn btn-brand-purple" onclick="confirmDelete()">Evet, Sil</button>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>
  <script src="/js/admin.js"></script>
  <script>
    let allProds = [], allCats = [], deleteId = null;

    async function load() {
      if (!await checkAuth()) return;
      allCats = await fetch('/api/categories').then(r=>r.json());
      allProds = await fetch('/api/products').then(r=>r.json());
      
      const catSel = document.getElementById('fCat');
      const catFilter = document.getElementById('catFilter');
      allCats.forEach(c => {
        catSel.innerHTML += `<option value="${c.id}">${c.icon} ${c.name}</option>`;
        catFilter.innerHTML += `<option value="${c.slug}">${c.name}</option>`;
      });
      renderTable(allProds);
    }

    function renderTable(prods) {
      document.getElementById('prodCount').textContent = `${prods.length} ürün`;
      const body = document.getElementById('prodBody');
      if (!prods.length) { body.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:2rem;color:var(--gray-400)">Ürün bulunamadı</td></tr>'; return; }
      body.innerHTML = prods.map(p => {
        const cat = allCats.find(c => c.id === p.category);
        const stockBadge = p.stock === 0 ? '<span class="badge badge-brand-purple">Tükendi</span>' : p.stock < 5 ? `<span class="badge badge-brand-green">⚡ ${p.stock}</span>` : `<span class="badge badge-green">${p.stock}</span>`;
        return `<tr>
          <td><strong style="font-size:0.92rem">${p.name}</strong></td>
          <td>${cat ? cat.icon + ' ' + cat.name : '–'}</td>
          <td style="font-weight:700">₺${p.price_retail.toFixed(2)}</td>
          <td style="color:var(--green);font-weight:700">₺${p.price_wholesale.toFixed(2)}</td>
          <td>${stockBadge}</td>
          <td>${p.featured ? '⭐' : '–'}</td>
          <td>
            <div style="display:flex;gap:0.4rem">
              <button class="btn btn-ghost btn-sm" onclick='editProduct(${JSON.stringify(p).replace(/'/g,"&#39;")})'>✏️ Düzenle</button>
              <button class="btn btn-brand-purple btn-sm" onclick="deleteProduct('${p.id}','${p.name.replace(/'/g,"\\'")}')">🗑️</button>
            </div>
          </td>
        </tr>`;
      }).join('');
    }

    function filterTable() {
      const q = document.getElementById('searchProd').value.toLowerCase();
      const cat = document.getElementById('catFilter').value;
      let res = allProds;
      if (q) res = res.filter(p => p.name.toLowerCase().includes(q) || (p.tags||[]).some(t=>t.toLowerCase().includes(q)));
      if (cat) res = res.filter(p => {
        const c = allCats.find(x => x.id === p.category);
        return c && c.slug === cat;
      });
      renderTable(res);
    }

    function openAddModal() {
      document.getElementById('modalTitle').textContent = 'Yeni Ürün Ekle';
      document.getElementById('editId').value = '';
      ['fName','fDesc','fTags','fPrice','fWholesale','fStock'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('fFeatured').checked = false;
      document.getElementById('modalError').style.display = 'none';
      openModal('prodModal');
    }

    function editProduct(p) {
      document.getElementById('modalTitle').textContent = 'Ürünü Düzenle';
      document.getElementById('editId').value = p.id;
      document.getElementById('fName').value = p.name;
      document.getElementById('fCat').value = p.category;
      document.getElementById('fPrice').value = p.price_retail;
      document.getElementById('fWholesale').value = p.price_wholesale;
      document.getElementById('fStock').value = p.stock;
      document.getElementById('fFeatured').checked = p.featured;
      document.getElementById('fDesc').value = p.description || '';
      document.getElementById('fTags').value = (p.tags||[]).join(', ');
      document.getElementById('modalError').style.display = 'none';
      openModal('prodModal');
    }

    async function saveProduct() {
      const id = document.getElementById('editId').value;
      const name = document.getElementById('fName').value.trim();
      const category = document.getElementById('fCat').value;
      const price_retail = document.getElementById('fPrice').value;
      const errEl = document.getElementById('modalError');
      if (!name || !category || !price_retail) { errEl.textContent = 'Ad, kategori ve fiyat zorunludur'; errEl.style.display = 'block'; return; }
      const body = {
        name, category, price_retail, tags: document.getElementById('fTags').value,
        price_wholesale: document.getElementById('fWholesale').value || '',
        stock: document.getElementById('fStock').value || 0,
        featured: document.getElementById('fFeatured').checked,
        description: document.getElementById('fDesc').value
      };
      const btn = document.getElementById('saveBtn');
      btn.disabled = true; btn.textContent = '⏳';
      const res = await fetch(id ? `/api/products/${id}` : '/api/products', {
        method: id ? 'PUT' : 'POST', headers: authHeaders(), body: JSON.stringify(body)
      });
      const data = await res.json();
      btn.disabled = false; btn.textContent = 'Kaydet';
      if (!res.ok) { errEl.textContent = data.message; errEl.style.display = 'block'; return; }
      closeModal('prodModal');
      showToast(id ? 'Ürün güncellendi ✅' : 'Ürün eklendi ✅');
      allProds = await fetch('/api/products').then(r=>r.json());
      filterTable();
    }

    function deleteProduct(id, name) {
      deleteId = id;
      document.getElementById('delName').textContent = name;
      openModal('delModal');
    }

    async function confirmDelete() {
      await fetch(`/api/products/${deleteId}`, { method: 'DELETE', headers: authHeaders() });
      closeModal('delModal');
      showToast('Ürün silindi');
      allProds = allProds.filter(p => p.id !== deleteId);
      filterTable();
    }

    load();
  </script>
</body>
</html>
