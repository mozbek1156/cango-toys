<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ürünler – Cango Toys</title>
  <meta name="description" content="Cango Toys ürün kataloğu. Oyuncak, kırtasiye, kutu oyunları, peluş ve daha fazlası. Perakende ve toptan fiyatlarla!"/>
  <link rel="stylesheet" href="/css/main.css"/>
</head>
<body>
  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="navbar-inner">
      <a href="/" class="navbar-brand"><div class="navbar-logo">Cango<span>Toys</span></div></a>
      <ul class="navbar-nav" id="navMenu">
        <li><a href="/" class="nav-link">Ana Sayfa</a></li>
        <li><a href="/products.html" class="nav-link active">Ürünler</a></li>
        <li><a href="/products.html?cat=kutu-oyunlari" class="nav-link">Kutu Oyunları</a></li>
        <li><a href="/about.html" class="nav-link">Hakkımızda</a></li>
      </ul>
      <div class="navbar-actions">
        <button class="btn-cart" onclick="window.location='/cart.html'">🛒 Sepet <span class="cart-badge" id="cartCount">0</span></button>
        <button class="hamburger" onclick="document.getElementById('navMenu').classList.toggle('open')"><span></span><span></span><span></span></button>
      </div>
    </div>
  </nav>

  <!-- PAGE HEADER -->
  <div class="page-header">
    <div class="container">
      <h1>🛍️ Ürün Kataloğu</h1>
      <p>Tüm ürünlerimiz – perakende ve toptan fiyatlarla</p>
      <div class="breadcrumb"><a href="/">Ana Sayfa</a><span class="breadcrumb-sep">/</span><span>Ürünler</span></div>
    </div>
  </div>

  <section class="section">
    <div class="container">
      <!-- SEARCH + SORT -->
      <div style="display:flex;gap:1rem;align-items:center;margin-bottom:1.5rem;flex-wrap:wrap">
        <div class="search-bar" style="flex:1;min-width:240px">
          <input type="text" id="searchInput" placeholder="Ürün ara… (oyuncak, lego, puzzle…)"/>
          <button onclick="doSearch()">🔍</button>
        </div>
        <select class="form-control form-select" id="sortSelect" style="width:200px" onchange="doSearch()">
          <option value="">Sıralama</option>
          <option value="price-asc">Fiyat: Artan</option>
          <option value="price-desc">Fiyat: Azalan</option>
          <option value="name">İsim A–Z</option>
        </select>
        <div class="pricing-toggle" style="flex-shrink:0">
          <button class="toggle-btn active" id="btnRetail" onclick="setPriceMode('retail')">Perakende</button>
          <button class="toggle-btn wholesale" id="btnWholesale" onclick="setPriceMode('wholesale')">Toptan</button>
        </div>
      </div>

      <div class="shop-layout">
        <!-- FILTER PANEL -->
        <aside class="filter-panel">
          <div class="filter-title">🎯 Filtreler</div>

          <div class="filter-section">
            <div class="filter-label">Kategoriler</div>
            <div id="catFilters">
              <label class="filter-option"><input type="radio" name="cat" value="" onchange="doSearch()" checked> Tümü</label>
            </div>
          </div>

          <div class="filter-section">
            <div class="filter-label">Fiyat Aralığı</div>
            <div style="display:flex;gap:0.5rem;align-items:center">
              <input class="form-control" type="number" id="minPrice" placeholder="Min ₺" style="width:90px" onchange="doSearch()"/>
              <span>–</span>
              <input class="form-control" type="number" id="maxPrice" placeholder="Max ₺" style="width:90px" onchange="doSearch()"/>
            </div>
          </div>

          <div class="filter-section">
            <div class="filter-label">Stok Durumu</div>
            <label class="filter-option"><input type="checkbox" id="inStockOnly" onchange="doSearch()"> Stokta olanlar</label>
          </div>

          <div class="filter-section">
            <div class="filter-label">Öne Çıkanlar</div>
            <label class="filter-option"><input type="checkbox" id="featuredOnly" onchange="doSearch()"> Sadece öne çıkanlar</label>
          </div>

          <button class="btn btn-ghost btn-sm btn-full mt-2" onclick="clearFilters()">↺ Filtreleri Temizle</button>
        </aside>

        <!-- PRODUCT GRID -->
        <div>
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.2rem;flex-wrap:wrap;gap:0.5rem">
            <div id="resultCount" style="font-weight:700;color:var(--gray-600)">Yükleniyor…</div>
          </div>
          <div class="product-grid" id="productGrid">
            <div class="skeleton"><div class="skeleton-img"></div><div class="skeleton-body"><div class="skeleton-line"></div><div class="skeleton-line short"></div></div></div>
            <div class="skeleton"><div class="skeleton-img"></div><div class="skeleton-body"><div class="skeleton-line"></div><div class="skeleton-line short"></div></div></div>
            <div class="skeleton"><div class="skeleton-img"></div><div class="skeleton-body"><div class="skeleton-line"></div><div class="skeleton-line short"></div></div></div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="container">
      <div class="footer-bottom" style="border-top:none;padding-top:0">
        <a href="/" class="footer-brand-name" style="font-family:var(--font-heading);font-size:1.5rem;font-weight:900;color:var(--brand-green)">Cango<span style="color:var(--brand-blue)">Toys</span></a>
        <div class="footer-bottom-text">© 2025 Cango Toys – Oyunun Kalbi Burada Atar!</div>
      </div>
    </div>
  </footer>

  <div class="toast-container" id="toastContainer"></div>
  <script src="/js/app.js"></script>
  <script>
    let allProducts = [];
    let priceMode = getCartType();

    function setPriceMode(mode) {
      priceMode = mode;
      setCartType(mode);
      document.getElementById('btnRetail').classList.toggle('active', mode === 'retail');
      document.getElementById('btnWholesale').classList.toggle('active', mode === 'wholesale');
      renderGrid(filterProducts());
    }

    async function init() {
      // Load categories for filter
      const cats = await fetch('/api/categories').then(r=>r.json());
      const catFilters = document.getElementById('catFilters');
      catFilters.innerHTML = '<label class="filter-option"><input type="radio" name="cat" value="" onchange="doSearch()" checked> Tümü</label>' +
        cats.map(c => `<label class="filter-option"><input type="radio" name="cat" value="${c.slug}" onchange="doSearch()"> ${c.icon} ${c.name} <span style="color:var(--gray-400);font-size:0.78rem">(${c.productCount})</span></label>`).join('');

      // Load all products
      allProducts = await fetch('/api/products').then(r=>r.json());

      // Check URL params
      const params = new URLSearchParams(window.location.search);
      const cat = params.get('cat');
      const type = params.get('type');
      if (cat) {
        const radio = document.querySelector(`input[name=cat][value="${cat}"]`);
        if (radio) radio.checked = true;
      }
      if (type === 'wholesale') setPriceMode('wholesale');

      doSearch();
      updateCartBadge();
    }

    function filterProducts() {
      let products = [...allProducts];
      const cat = document.querySelector('input[name=cat]:checked')?.value;
      const search = document.getElementById('searchInput').value.toLowerCase().trim();
      const minPrice = parseFloat(document.getElementById('minPrice').value) || 0;
      const maxPrice = parseFloat(document.getElementById('maxPrice').value) || Infinity;
      const inStockOnly = document.getElementById('inStockOnly').checked;
      const featuredOnly = document.getElementById('featuredOnly').checked;
      const sort = document.getElementById('sortSelect').value;

      if (cat) products = products.filter(p => p.categoryInfo?.slug === cat);
      if (search) products = products.filter(p => p.name.toLowerCase().includes(search) || (p.tags||[]).some(t=>t.toLowerCase().includes(search)));
      if (minPrice) products = products.filter(p => p.price_retail >= minPrice);
      if (maxPrice < Infinity) products = products.filter(p => p.price_retail <= maxPrice);
      if (inStockOnly) products = products.filter(p => p.stock > 0);
      if (featuredOnly) products = products.filter(p => p.featured);

      if (sort === 'price-asc') products.sort((a,b) => a.price_retail - b.price_retail);
      else if (sort === 'price-desc') products.sort((a,b) => b.price_retail - a.price_retail);
      else if (sort === 'name') products.sort((a,b) => a.name.localeCompare(b.name, 'tr'));

      return products;
    }

    function renderGrid(products) {
      const grid = document.getElementById('productGrid');
      const count = document.getElementById('resultCount');
      count.textContent = `${products.length} ürün bulundu`;
      if (!products.length) {
        grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="empty-state-icon">😢</div><h3>Ürün bulunamadı</h3><p>Farklı filtreler deneyin</p></div>';
        return;
      }
      // Override price display for wholesale mode
      grid.innerHTML = products.map(p => {
        const displayPrice = priceMode === 'wholesale' ? p.price_wholesale : p.price_retail;
        const pMod = { ...p, price_retail: displayPrice };
        return renderProductCard(pMod);
      }).join('');
    }

    function doSearch() {
      if (allProducts.length) renderGrid(filterProducts());
    }

    function clearFilters() {
      document.querySelector('input[name=cat][value=""]').checked = true;
      document.getElementById('searchInput').value = '';
      document.getElementById('minPrice').value = '';
      document.getElementById('maxPrice').value = '';
      document.getElementById('inStockOnly').checked = false;
      document.getElementById('featuredOnly').checked = false;
      doSearch();
    }

    document.getElementById('searchInput').addEventListener('keyup', e => { if(e.key==='Enter') doSearch(); });
    init();
  </script>
</body>
</html>
