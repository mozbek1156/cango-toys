<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sipariş Alındı – Cango Toys</title>
  <link rel="stylesheet" href="/css/main.css"/>
</head>
<body>
  <nav class="navbar">
    <div class="navbar-inner">
      <a href="/" class="navbar-brand"><div class="navbar-logo">Cango<span>Toys</span></div></a>
      <div class="navbar-actions">
        <button class="btn-cart" onclick="window.location='/cart.html'">🛒 <span class="cart-badge" id="cartCount">0</span></button>
      </div>
    </div>
  </nav>

  <section style="min-height:80vh;display:flex;align-items:center;justify-content:center;padding:3rem 1.5rem">
    <div style="max-width:560px;width:100%;text-align:center">
      <div style="font-size:6rem;margin-bottom:1.5rem;animation:bounce 1s infinite">🎉</div>
      <h1 style="color:var(--navy);margin-bottom:0.8rem">Siparişiniz Alındı!</h1>
      <p style="color:var(--gray-600);font-size:1.1rem;margin-bottom:2rem">Teşekkürler! Siparişiniz başarıyla oluşturuldu. En kısa sürede sizinle iletişime geçeceğiz.</p>

      <div class="order-info-card" style="text-align:left;margin-bottom:2rem">
        <h3 style="margin-bottom:1rem">📋 Sipariş Detayları</h3>
        <div class="order-summary-row"><span>Sipariş Kodu</span><span id="orderCode" style="font-weight:800;color:var(--brand-blue)">–</span></div>
        <div class="order-summary-row"><span>Müşteri</span><span id="orderCustomer">–</span></div>
        <div class="order-summary-row"><span>Tür</span><span id="orderType">–</span></div>
        <div class="order-summary-row"><span>Tarih</span><span id="orderDate">–</span></div>
        <div class="order-total-row"><span>TOPLAM</span><span id="orderTotal" style="color:var(--brand-blue)">–</span></div>
      </div>

      <div id="orderItemsList" style="text-align:left;background:white;border-radius:var(--radius-xl);padding:1.5rem;box-shadow:var(--shadow-card);margin-bottom:2rem"></div>

      <div style="display:flex;gap:1rem;justify-content:center;flex-wrap:wrap">
        <a href="/" class="btn btn-primary btn-lg">Ana Sayfaya Dön</a>
        <a href="/products.html" class="btn btn-secondary btn-lg">Alışverişe Devam Et</a>
      </div>
    </div>
  </section>

  <style>
    @keyframes bounce {
      0%,100%{transform:translateY(0)} 50%{transform:translateY(-15px)}
    }
  </style>
  <script src="/js/app.js"></script>
  <script>
    const order = JSON.parse(localStorage.getItem('lastOrder') || 'null');
    if (order) {
      document.getElementById('orderCode').textContent = order.code;
      document.getElementById('orderCustomer').textContent = order.customer.name;
      document.getElementById('orderType').textContent = order.type === 'wholesale' ? '📦 Toptan' : '🛍️ Perakende';
      document.getElementById('orderTotal').textContent = '₺' + order.totalPrice.toFixed(2);
      document.getElementById('orderDate').textContent = new Date(order.createdAt).toLocaleString('tr-TR');
      document.getElementById('orderItemsList').innerHTML = `
        <div style="font-weight:800;margin-bottom:0.8rem">🛒 Sipariş Kalemleri</div>
        ${order.items.map(i=>`<div class="order-summary-row"><span>${i.name} x${i.qty}</span><span>₺${i.subtotal.toFixed(2)}</span></div>`).join('')}
      `;
      localStorage.removeItem('lastOrder');
    }
    updateCartBadge();
  </script>
</body>
</html>
